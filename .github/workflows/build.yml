name: build

on: [push]

jobs:
  build-posix:
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest]
        include:
        - os: macOS-latest
          flags: LDLIBS=
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v1
    - name: make
      run: make ${{ matrix.flags }}

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v1
    - uses: ilammy/msvc-dev-cmd@v1
    - name: nmake
      shell: cmd
      run: nmake -f Makefile.nmake
